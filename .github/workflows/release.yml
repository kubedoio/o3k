name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless signing via Sigstore (OIDC)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Run unit tests
        run: |
          go test -short -count=1 ./internal/cinder/...
          go test -race -count=1 $(go list ./... | grep -v '/test/contract' | grep -v 'internal/cinder')

      - name: Build all binaries
        run: |
          make build
          make build-compat-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  vuln-check:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true  # advisory only — tracked in security backlog

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: [test, lint]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Build binaries (linux/amd64)
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s -X main.Version=${{ steps.version.outputs.version }}" -o dist/o3k-linux-amd64 ./cmd/o3k
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s -X main.Version=${{ steps.version.outputs.version }}" -o dist/compat-check-linux-amd64 ./cmd/compat-check

      - name: Build binaries (linux/arm64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-w -s -X main.Version=${{ steps.version.outputs.version }}" -o dist/o3k-linux-arm64 ./cmd/o3k
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-w -s -X main.Version=${{ steps.version.outputs.version }}" -o dist/compat-check-linux-arm64 ./cmd/compat-check

      - name: Build binaries (darwin/arm64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-w -s -X main.Version=${{ steps.version.outputs.version }}" -o dist/o3k-darwin-arm64 ./cmd/o3k
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-w -s -X main.Version=${{ steps.version.outputs.version }}" -o dist/compat-check-darwin-arm64 ./cmd/compat-check

      - name: Copy install script
        run: cp scripts/install.sh dist/install.sh && cp scripts/setup-flat-network.sh dist/setup-flat-network.sh

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      # ---- Supply chain: SBOMs + cosign signatures (Phase 4 Slice 4.2) ----
      # syft scans the source tree and produces one SPDX SBOM that
      # describes everything that goes into the binaries (Go modules,
      # transitive deps). cosign signs the binaries and the
      # checksums.txt with keyless OIDC, anchoring identity to this
      # workflow run. Verification recipe lives in
      # docs/release-verification.md.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.17.8

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: 'v2.4.1'

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft scan dist/o3k-linux-amd64 \
            -o spdx-json=dist/o3k-${{ steps.version.outputs.version }}.spdx.json
          # Quick sanity check: SBOM should be ≥10KiB and parse as JSON.
          test "$(wc -c < dist/o3k-${{ steps.version.outputs.version }}.spdx.json)" -gt 10240
          jq -e .SPDXID dist/o3k-${{ steps.version.outputs.version }}.spdx.json > /dev/null

      - name: Sign binaries and checksums (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cd dist
          # Sign the canonical checksum manifest. Verifying checksums.txt
          # transitively verifies every artifact listed inside it.
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt
          # Also sign the SBOM directly so consumers can attest to the
          # SBOM without needing the full release tree.
          cosign sign-blob --yes \
            --output-signature o3k-${{ steps.version.outputs.version }}.spdx.json.sig \
            --output-certificate o3k-${{ steps.version.outputs.version }}.spdx.json.pem \
            o3k-${{ steps.version.outputs.version }}.spdx.json
          ls -la *.sig *.pem

      - name: Verify signatures (self-check)
        run: |
          cd dist
          # Sanity: verify what we just signed before publishing it.
          # Identity must match this workflow's tag-triggered run.
          cosign verify-blob \
            --certificate checksums.txt.pem \
            --signature   checksums.txt.sig \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/v.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            checksums.txt

      - name: Generate release notes
        id: notes
        run: |
          # Extract changelog section for this version
          VERSION=${{ steps.version.outputs.version }}
          awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 | tail -n +2 > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${{ steps.version.outputs.tag }}" > /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline >> /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist/o3k-linux-amd64
            dist/o3k-linux-arm64
            dist/o3k-darwin-arm64
            dist/compat-check-linux-amd64
            dist/compat-check-linux-arm64
            dist/compat-check-darwin-arm64
            dist/install.sh
            dist/setup-flat-network.sh
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            dist/o3k-${{ steps.version.outputs.version }}.spdx.json
            dist/o3k-${{ steps.version.outputs.version }}.spdx.json.sig
            dist/o3k-${{ steps.version.outputs.version }}.spdx.json.pem
          generate_release_notes: false

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/package/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Supply chain: image signing + SBOM attestation ----
      # Signs every published image tag with cosign keyless. Attaches an
      # SPDX SBOM as a Sigstore attestation in the registry, so
      # `cosign verify-attestation` returns the SBOM by digest.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: 'v2.4.1'

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.17.8

      - name: Sign image and attach SBOM
        env:
          COSIGN_YES: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS:   ${{ steps.meta.outputs.tags }}
        run: |
          # Sign each tag at the digest just pushed. Pinning to digest
          # avoids the racy "tag moved between push and sign" failure mode.
          for tag in $TAGS; do
            ref="${tag%:*}@${DIGEST}"
            echo "==> signing $ref"
            cosign sign --yes "$ref"
          done

          # Generate SBOM for the image and attach it as an attestation.
          # We attach to the first tag's digest; cosign tree shows all.
          first_tag=$(echo "$TAGS" | head -n1)
          ref="${first_tag%:*}@${DIGEST}"
          syft scan "registry:${first_tag}" \
            -o spdx-json=image.spdx.json
          cosign attest --yes \
            --predicate image.spdx.json \
            --type spdxjson \
            "$ref"
