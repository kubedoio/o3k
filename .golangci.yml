version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - unconvert
    - gocritic
    - revive

  settings:
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
        - commentFormatting
        - exitAfterDefer
    revive:
      rules:
        - name: var-naming
          disabled: true
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: empty-block
          disabled: true
    errcheck:
      # Close/Rollback calls in defer are non-actionable: the operation is
      # already complete and errors cannot be handled meaningfully.
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        - (*database/sql.DB).Close
        - (io.Closer).Close
        - (*os.File).Close
        - (*net.Conn).Close

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - revive
          - bodyclose
      - path: test/
        linters:
          - errcheck
          - gocritic
          - revive
          - bodyclose

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
